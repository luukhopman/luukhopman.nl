<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Todo</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Permanent+Marker&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/todo/todo.css">
</head>

<body>
    <div class="todo-shell">
        <main class="todo-panel">
            <header class="todo-header">
                <h1>Todo</h1>
            </header>

            <form class="todo-form" id="todo-form">
                <div class="field-group field-title">
                    <label class="sr-only" for="todo-input">Add a task</label>
                    <input id="todo-input" name="todo" type="text" maxlength="120"
                        placeholder="Write the next thing that matters">
                </div>
                <div class="field-group field-date">
                    <label class="sr-only" for="todo-due-date">Due date</label>
                    <input id="todo-due-date" name="due_date" type="date">
                </div>
                <button type="submit">Add</button>
            </form>

            <div class="todo-toolbar">
                <button type="button" class="toolbar-button is-active" data-filter="all">All</button>
                <button type="button" class="toolbar-button" data-filter="open">Open</button>
                <button type="button" class="toolbar-button" data-filter="done">Done</button>
            </div>

            <ul class="todo-list" id="todo-list"></ul>
        </main>
    </div>

    <template id="todo-item-template">
        <li class="todo-item">
            <div class="todo-item-main">
                <label class="todo-check">
                    <input type="checkbox">
                    <span class="todo-mark"></span>
                </label>
                <div class="todo-copy">
                    <span class="todo-text"></span>
                    <div class="todo-meta">
                        <span class="todo-due-chip" hidden></span>
                    </div>
                </div>
            </div>
            <div class="todo-actions">
                <button type="button" class="todo-delete" aria-label="Delete task">Delete</button>
            </div>
        </li>
    </template>

    <script src="/static/todo/todo.js" defer></script>
</body>

</html>
