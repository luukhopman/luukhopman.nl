<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bruna's Cookbook</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/recipes/recipes.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="recipes-body">

    <div class="recipes-container">
        <header class="recipe-header">
            <div class="header-main">
                <div class="heading-wrap">
                    <h1>Bruna's Cookbook</h1>
                    <p class="subtitle">Simple, personal recipes in one place.</p>
                </div>
                <button id="show-add-form-btn" class="new-recipe-btn">
                    <i class="fa-solid fa-plus"></i> New Recipe
                </button>
            </div>

            <div class="search-filter-controls">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="recipe-search" placeholder="Search titles, ingredients..."
                        autocomplete="off">
                </div>
            </div>
        </header>

        <main>
            <div id="loading-spinner" class="spinner-container">
                <div class="spinner"></div>
            </div>
            <div id="recipe-list" class="recipes-grid">
                <!-- Recipes injected via JS -->
            </div>
        </main>
    </div>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New Recipe</h2>
                <button type="button" id="close-modal-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="recipe-modal-scroll">
                <form id="recipe-form">
                    <input type="hidden" id="recipe-id">
                    <div class="form-group">
                        <label for="recipe-url">Recipe URL</label>
                        <div class="parse-url-row">
                            <input type="url" id="recipe-url" placeholder="https://..." autocomplete="off">
                            <button type="button" id="parse-url-btn" class="new-recipe-btn parse-btn">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> Parse
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="recipe-title">Recipe Title</label>
                        <input type="text" id="recipe-title" placeholder="e.g. Grandma's Pasta" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="recipe-description">Short Intro</label>
                        <input type="text" id="recipe-description" placeholder="A quick summary..." autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="recipe-ingredients">Ingredients</label>
                        <textarea id="recipe-ingredients" rows="4" placeholder="List ingredients here..."
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recipe-instructions">Instructions</label>
                        <textarea id="recipe-instructions" rows="6" placeholder="How do we make it?" required></textarea>
                    </div>
                    <button type="submit" class="save-btn">Save to Cookbook</button>
                </form>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div id="view-modal" class="modal-overlay hidden">
        <div class="modal-content view-modal-content">
            <div class="view-modal-header">
                <div class="view-header-left">
                    <h2 id="view-title">Recipe Title</h2>
                </div>
                <div class="view-header-actions">
                    <button id="view-edit-btn" class="icon-btn" title="Edit"><i class="fa-solid fa-pen"></i></button>
                    <button id="view-close-btn" class="icon-btn" title="Close"><i
                            class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <div class="view-modal-scroll">
                <p id="view-description" class="view-description-text">Description goes here</p>

                <div id="view-link-container" class="view-link-section">
                    <!-- External link badge will be here -->
                </div>

                <div class="view-body">
                    <section class="ingredients-section">
                        <h3>Ingredients</h3>
                        <ul id="view-ingredients-list" class="checklist">
                            <!-- Items with checkboxes -->
                        </ul>
                    </section>

                    <section class="instructions-section">
                        <h3>Instructions</h3>
                        <div id="view-instructions-content" class="numbered-list">
                            <!-- Ordered steps -->
                        </div>
                    </section>

                    <section id="view-notes-section" class="notes-section">
                        <h3>Cooking Notes</h3>
                        <textarea id="view-notes-input" rows="4"
                            placeholder="Add a note while cooking..."></textarea>
                        <div class="view-notes-actions">
                            <button id="view-save-notes-btn" class="save-btn view-notes-save" type="button">Save
                                Note</button>
                            <span id="view-notes-status" class="view-notes-status hidden">Saved</span>
                        </div>
                        <p id="view-notes-content"></p>
                    </section>
                </div>
            </div>
        </div>
    </div>


    <script src="/static/recipes/recipes.js"></script>
</body>

</html>
