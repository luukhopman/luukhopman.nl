<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        body {
            margin: 0;
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding:
                max(1rem, env(safe-area-inset-top))
                1rem
                max(1rem, env(safe-area-inset-bottom));
            background: #faf8f3;
            color: #2f2417;
            overflow-x: hidden;
        }

        form {
            width: min(360px, 100%);
            transform: translateY(-28px);
        }

        .lock-icon {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 0.5rem;
            display: grid;
            place-items: center;
        }

        .lock-icon svg {
            width: 1.6rem;
            height: 1.6rem;
            color: #4b5563;
        }

        #password {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddcfbc;
            border-radius: 12px;
            padding: 0.95rem 1rem;
            font-size: 1rem;
            background: #fff;
            color: #2f2417;
        }

        #password:focus {
            outline: none;
            border-color: #c8ab85;
            box-shadow: 0 0 0 3px rgba(245, 189, 99, 0.25);
        }

        #submit-btn {
            width: 100%;
            margin-top: 0.6rem;
            border: 1px solid #3f5d31;
            border-radius: 12px;
            padding: 0.82rem 1rem;
            font-size: 0.94rem;
            font-weight: 700;
            color: #fff;
            background: #4d6b3d;
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease;
        }

        #submit-btn:hover {
            background: #445f36;
            border-color: #324a27;
        }

        #submit-btn:disabled {
            opacity: 0.72;
            cursor: not-allowed;
        }

        .status {
            margin-top: 0.55rem;
            min-height: 1.2rem;
            font-size: 0.85rem;
            color: #8a3f3f;
        }

        @media (max-width: 600px) {
            body {
                align-items: flex-start;
            }

            form {
                transform: none;
                margin-top: 18vh;
            }
        }
    </style>
</head>

<body>
    <form id="login-form" autocomplete="on">
        <div class="lock-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" role="img" aria-label="Lock">
                <rect x="5" y="10" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8" />
                <path d="M8 10V7.8a4 4 0 1 1 8 0V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
        </div>
        <input type="password" id="password" placeholder="Password" required autofocus autocomplete="current-password">
        <button id="submit-btn" type="submit">Continue</button>
        <div id="status" class="status"></div>
    </form>

    <script>
        const form = document.getElementById('login-form');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const statusEl = document.getElementById('status');
        let submitting = false;

        async function submitLogin(e) {
            if (e) e.preventDefault();
            if (submitting) return;
            const password = passwordInput.value;
            if (!password) return;
            submitting = true;
            submitBtn.disabled = true;
            statusEl.textContent = 'Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = normalizeRedirect(urlParams.get('redirect'));
                    window.location.href = redirect;
                    return;
                }

                statusEl.textContent = 'Wrong password.';
                passwordInput.value = '';
                passwordInput.focus();
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Connection error.';
            } finally {
                submitting = false;
                submitBtn.disabled = false;
            }
        }

        form.addEventListener('submit', submitLogin);
        passwordInput.addEventListener('input', () => {
            if (statusEl.textContent) statusEl.textContent = '';
        });

        function normalizeRedirect(value) {
            if (!value) return '/';
            if (!value.startsWith('/')) return '/';
            if (value.startsWith('//')) return '/';
            return value;
        }
    </script>
</body>

</html>
