<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fafaf9">
    <title>Wishlist</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/wishlist/theme.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="wishlist-body">

    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-basket-shopping"></i> Wishlist</h1>
        </header>

        <section class="add-product-section">
            <form id="add-product-form" class="glass-panel">
                <div class="input-group">
                    <input type="text" id="product-name" placeholder="What do we need?" required autocomplete="off"
                        enterkeyhint="next" inputmode="text">
                </div>
                <div class="row-group">
                    <div class="input-group">
                        <i class="fa-solid fa-tag input-icon"></i>
                        <input type="text" id="product-store" placeholder="Store (Optional)" autocomplete="off"
                            enterkeyhint="next" inputmode="text">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-link input-icon"></i>
                        <input type="url" id="product-url" placeholder="Link (Optional)" autocomplete="off"
                            enterkeyhint="done" inputmode="url">
                    </div>
                </div>
                <button type="submit" class="primary-btn">
                    <i class="fa-solid fa-plus"></i> Add Item
                </button>
            </form>
        </section>

        <section class="products-section">
            <div class="filters">
                <button class="filter-btn" data-filter="all">All Items</button>
                <button class="filter-btn active" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="acquired">Acquired</button>
                <button class="filter-btn" data-filter="deleted">Deleted</button>
            </div>

            <div id="loading-spinner" class="spinner-container">
                <div class="spinner"></div>
            </div>

            <div id="product-list" class="product-list-container">
                <!-- Product groups will be injected here via JS -->
            </div>
        </section>
    </div>
    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class="fa-solid fa-pen"></i> Edit Item</h2>
                <button type="button" id="close-modal-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="edit-product-form">
                <input type="hidden" id="edit-product-id">
                <div class="input-group">
                    <input type="text" id="edit-product-name" placeholder="Item name" required autocomplete="off"
                        enterkeyhint="next" inputmode="text">
                </div>
                <div class="row-group">
                    <div class="input-group">
                        <i class="fa-solid fa-tag input-icon"></i>
                        <input type="text" id="edit-product-store" placeholder="Store (Optional)" autocomplete="off"
                            enterkeyhint="next" inputmode="text">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-link input-icon"></i>
                        <input type="url" id="edit-product-url" placeholder="Link (Optional)" autocomplete="off"
                            enterkeyhint="done" inputmode="url">
                    </div>
                </div>
                <button type="submit" class="primary-btn">
                    <i class="fa-solid fa-save"></i> Save Changes
                </button>
            </form>
        </div>
    </div>
    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel confirm-modal-content">
            <div class="confirm-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h2 id="confirm-title" class="confirm-title">Are you sure?</h2>
            <p id="confirm-message" class="confirm-message"></p>
            <div class="confirm-actions">
                <button type="button" id="confirm-cancel-btn" class="confirm-btn confirm-btn-cancel">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </button>
                <button type="button" id="confirm-ok-btn" class="confirm-btn confirm-btn-danger">
                    <i class="fa-solid fa-trash"></i> Clear All
                </button>
            </div>
        </div>
    </div>


    <script src="/static/wishlist/main.js"></script>
</body>

</html>
