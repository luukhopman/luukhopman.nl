<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Welcome Home</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/landing.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="landing-body">
    <div class="landing-background"></div>
    <div class="landing-wrapper">
        <main class="apps-grid">
            <a href="/wishlist" class="app-card wishlist">
                <div class="app-card-content">
                    <div class="app-icon shadow-todo"><i class="fa-solid fa-basket-shopping"></i></div>
                    <div class="app-info">
                        <h2>Wishlist</h2>
                        <p>Track the items we need to buy and things we want.</p>
                    </div>
                </div>
                <div class="app-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="/cookbook" class="app-card cookbook">
                <div class="app-card-content">
                    <div class="app-icon shadow-recipes"><i class="fa-solid fa-utensils"></i></div>
                    <div class="app-info">
                        <h2>Cookbook</h2>
                        <p>Explore recipes and save our favorite family meals.</p>
                    </div>
                </div>
                <div class="app-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
        </main>
    </div>
</body>

</html>
