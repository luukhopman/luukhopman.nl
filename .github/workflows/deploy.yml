name: Deploy application to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app/,alembic/,alembic.ini,pyproject.toml,uv.lock,.python-version"
          target: "~/todo"
          overwrite: true

      - name: Install dependencies and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_PASSWORD
          script: |
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/todo
            sudo systemctl stop fastapi-todo || true
            if [ -f products.db ]; then sudo chown $USER:$USER products.db; fi
            uv sync
            uv run alembic upgrade head
            cat <<SERVICEEOF | sudo tee /etc/systemd/system/fastapi-todo.service > /dev/null
            [Unit]
            Description=Uvicorn daemon for Wishlist
            After=network.target
            [Service]
            WorkingDirectory=$HOME/todo
            Environment=PATH=$HOME/todo/.venv/bin:$HOME/.local/bin:/usr/local/bin:/usr/bin
            Environment="APP_PASSWORD=$APP_PASSWORD"
            ExecStart=$HOME/todo/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --workers 2
            Restart=always
            [Install]
            WantedBy=multi-user.target
            SERVICEEOF
            sudo systemctl daemon-reload
            sudo systemctl restart fastapi-todo
