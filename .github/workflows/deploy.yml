name: Deploy application to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test:run

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/app/**/*.{js,jsx,ts,tsx}', 'frontend/components/**/*.{js,jsx,ts,tsx}', 'frontend/styles/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://localhost:5432/unused
          APP_PASSWORD: build_only
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Copy application files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/,README.md,.gitignore"
          target: "~/website"
          overwrite: true
          tar_exec: true
          strip_components: 0
          timeout: 60s

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          AUTH_COOKIE_DOMAIN: ${{ secrets.AUTH_COOKIE_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DOMAIN_WWW: ${{ secrets.DOMAIN_WWW }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          ENABLE_SSL: ${{ secrets.ENABLE_SSL }}
          INCLUDE_WWW: ${{ secrets.INCLUDE_WWW }}
          APP_SUBDOMAINS: ${{ secrets.APP_SUBDOMAINS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GIFTS_PASSWORD: ${{ secrets.GIFTS_PASSWORD }}
          GIFTS_USERS: ${{ secrets.GIFTS_USERS }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_PASSWORD,AUTH_COOKIE_DOMAIN,DATABASE_URL,DOMAIN,DOMAIN_WWW,LETSENCRYPT_EMAIL,ENABLE_SSL,INCLUDE_WWW,APP_SUBDOMAINS,GEMINI_API_KEY,GEMINI_MODEL,GIFTS_PASSWORD,GIFTS_USERS
          script: |
            set -euo pipefail

            APP_DIR="$HOME/website"
            SERVICE_NAME="website"
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            NGINX_CONF="/etc/nginx/sites-available/${SERVICE_NAME}"

            ROOT_DOMAIN="${DOMAIN:-luukhopman.nl}"
            AUTH_COOKIE_DOMAIN="${AUTH_COOKIE_DOMAIN:-$ROOT_DOMAIN}"
            INCLUDE_WWW="${INCLUDE_WWW:-true}"
            WWW_DOMAIN="${DOMAIN_WWW:-www.${ROOT_DOMAIN}}"
            ENABLE_SSL="${ENABLE_SSL:-true}"
            LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL:-}"
            APP_SUBDOMAINS="${APP_SUBDOMAINS:-wishlist cookbook todo gifts}"
            DATABASE_URL="${DATABASE_URL:-}"

            build_primary_domain_list() {
              local domains=()

              if [ -n "$ROOT_DOMAIN" ]; then
                domains+=("$ROOT_DOMAIN")
                if [ "$INCLUDE_WWW" = "true" ]; then
                  domains+=("$WWW_DOMAIN")
                fi
              else
                domains+=("$EXTERNAL_IP")
              fi

              printf '%s\n' "${domains[@]}"
            }

            build_redirect_domain_list() {
              local domains=()

              if [ -n "$ROOT_DOMAIN" ]; then
                for subdomain in $APP_SUBDOMAINS; do
                  domains+=("${subdomain}.${ROOT_DOMAIN}")
                done
              fi

              printf '%s\n' "${domains[@]}"
            }

            build_certbot_domain_list() {
              build_primary_domain_list
              build_redirect_domain_list
            }

            render_redirect_server_blocks() {
              if [ -z "$ROOT_DOMAIN" ]; then
                return
              fi

              for subdomain in $APP_SUBDOMAINS; do
                cat <<EOF_REDIRECT
            server {
                listen 80;
                server_name ${subdomain}.${ROOT_DOMAIN};

                return 307 \$scheme://${ROOT_DOMAIN}/${subdomain}\$is_args\$args;
            }

            EOF_REDIRECT
              done
            }

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Only update if necessary to save time
            if ! command -v nginx >/dev/null || ! command -v certbot >/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx curl certbot python3-certbot-nginx ca-certificates gnupg
            fi

            NODE_MAJOR_VERSION="$(node -p "process.versions.node.split('.')[0]" 2>/dev/null || echo 0)"
            if [ "$NODE_MAJOR_VERSION" -lt 20 ]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            cd "$APP_DIR/frontend"
            # Always ensure dependencies are installed to avoid version mismatches.
            # We need all dependencies (not just production) because 'npm run migrate' uses 'tsx'.
            npm ci --no-audit --no-fund --prefer-offline
            npm run migrate
            cd "$APP_DIR"

            # Create an environment file to store secrets. This is safer and more robust than
            # putting them directly in the service file via 'Environment='.
            ENV_FILE="$APP_DIR/.env.production"
            cat <<ENVEOF | sudo tee "$ENV_FILE" > /dev/null
            APP_PASSWORD=${APP_PASSWORD:-}
            AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
            DATABASE_URL=${DATABASE_URL:-}
            DOMAIN=${ROOT_DOMAIN:-}
            GEMINI_API_KEY=${GEMINI_API_KEY:-}
            GEMINI_MODEL=${GEMINI_MODEL:-}
            GIFTS_PASSWORD=${GIFTS_PASSWORD:-}
            GIFTS_USERS=${GIFTS_USERS:-}
            ENVEOF
            sudo chmod 600 "$ENV_FILE"

            cat <<SERVICEEOF | sudo tee "$SERVICE_FILE" > /dev/null
            [Unit]
            Description=Next.js Website App
            After=network.target

            [Service]
            User=$USER
            Group=www-data
            WorkingDirectory=$APP_DIR/frontend/.next/standalone
            Environment="PATH=/usr/local/bin:/usr/bin"
            Environment="NODE_ENV=production"
            EnvironmentFile=$ENV_FILE
            ExecStart=/usr/bin/node server.js --hostname 127.0.0.1 --port 3000
            Restart=always

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE_NAME"
            sudo systemctl restart "$SERVICE_NAME"

            EXTERNAL_IP=$(curl -s ifconfig.me)
            SERVER_NAMES=$(build_primary_domain_list | tr '\n' ' ' | xargs)
            REDIRECT_SERVER_BLOCKS="$(render_redirect_server_blocks)"
            NGINX_BACKUP="$(mktemp)"

            if [ -f "$NGINX_CONF" ]; then
              sudo cp "$NGINX_CONF" "$NGINX_BACKUP"
            fi

            cat <<NGINXEOF | sudo tee "$NGINX_CONF" > /dev/null
            server {
                listen 80;
                server_name $SERVER_NAMES;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }

            $REDIRECT_SERVER_BLOCKS
            NGINXEOF

            sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl restart nginx

            if command -v ufw >/dev/null 2>&1; then
              sudo ufw allow 'Nginx Full' || true
            fi

            if [ "$ENABLE_SSL" = "true" ] && [ -n "$ROOT_DOMAIN" ]; then
              CERTBOT_ARGS=(--nginx -n --agree-tos --redirect --expand --cert-name "$ROOT_DOMAIN")
              if [ -n "$LETSENCRYPT_EMAIL" ]; then
                CERTBOT_ARGS+=(--email "$LETSENCRYPT_EMAIL")
              else
                CERTBOT_ARGS+=(--register-unsafely-without-email)
              fi

              while IFS= read -r domain; do
                CERTBOT_ARGS+=(-d "$domain")
              done < <(build_certbot_domain_list)

              if ! sudo certbot "${CERTBOT_ARGS[@]}"; then
                if [ -s "$NGINX_BACKUP" ]; then
                  sudo cp "$NGINX_BACKUP" "$NGINX_CONF"
                  sudo nginx -t
                  sudo systemctl restart nginx
                fi
                exit 1
              fi
            fi

            rm -f "$NGINX_BACKUP"
