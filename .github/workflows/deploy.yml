name: Deploy application to VPS

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test:run

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ~/.cache/website-frontend/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/app/**/*.{js,jsx,ts,tsx}', 'frontend/components/**/*.{js,jsx,ts,tsx}', 'frontend/styles/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://localhost:5432/unused
          APP_PASSWORD: build_only
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Build deploy migration bundle
        working-directory: frontend
        run: npm run build:deploy:migrate

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail

          rm -rf deploy-package
          mkdir -p deploy-package/frontend/.next/standalone/deploy

          cp -R frontend/public deploy-package/frontend/
          cp -R frontend/.next/standalone deploy-package/frontend/.next/
          cp -R frontend/.next/static deploy-package/frontend/.next/
          cp -R frontend/deploy-dist/. deploy-package/frontend/.next/standalone/deploy/

      - name: Create deploy archive
        run: |
          set -euo pipefail

          rm -rf deploy-artifact
          mkdir -p deploy-artifact

          tar -C deploy-package -czf deploy-artifact/website-frontend-deploy.tar.gz frontend
          cp .github/scripts/deploy-vps.sh deploy-artifact/

      - name: Upload deploy archive
        uses: actions/upload-artifact@v4
        with:
          name: website-frontend-deploy
          path: deploy-artifact
          compression-level: 0
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Download deploy archive
        uses: actions/download-artifact@v4
        with:
          name: website-frontend-deploy
          path: deploy-artifact

      - name: Validate deploy artifact
        run: |
          set -euo pipefail

          test -f deploy-artifact/website-frontend-deploy.tar.gz
          test -f deploy-artifact/deploy-vps.sh

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy application files to VPS
        timeout-minutes: 10
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
        run: |
          set -euo pipefail

          VPS_HOST="$(printf '%s' "$VPS_IP" | xargs)"
          VPS_USER="$(printf '%s' "$VPS_USERNAME" | xargs)"
          SSH_ARGS=(
            -i "$HOME/.ssh/deploy_key"
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
          )
          REMOTE="$VPS_USER@$VPS_HOST"
          ARCHIVE_PATH="$PWD/deploy-artifact/website-frontend-deploy.tar.gz"

          for attempt in 1 2 3 4; do
            if scp "${SSH_ARGS[@]}" "$ARCHIVE_PATH" "$REMOTE:~/website-frontend-deploy.tar.gz"; then
              exit 0
            fi

            if [ "$attempt" -eq 4 ]; then
              exit 1
            fi

            echo "SCP attempt $attempt failed; retrying in 15 seconds..."
            sleep 15
          done

      - name: Deploy on VPS
        timeout-minutes: 20
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          AUTH_COOKIE_DOMAIN: ${{ secrets.AUTH_COOKIE_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DOMAIN_WWW: ${{ secrets.DOMAIN_WWW }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          ENABLE_SSL: ${{ secrets.ENABLE_SSL }}
          INCLUDE_WWW: ${{ secrets.INCLUDE_WWW }}
          APP_SUBDOMAINS: ${{ secrets.APP_SUBDOMAINS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GIFTS_PASSWORD: ${{ secrets.GIFTS_PASSWORD }}
          GIFTS_USERS: ${{ secrets.GIFTS_USERS }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
        run: |
          set -euo pipefail

          VPS_HOST="$(printf '%s' "$VPS_IP" | xargs)"
          VPS_USER="$(printf '%s' "$VPS_USERNAME" | xargs)"
          SSH_ARGS=(
            -i "$HOME/.ssh/deploy_key"
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=30
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
          )
          REMOTE="$VPS_USER@$VPS_HOST"

          {
            printf 'export APP_PASSWORD=%q\n' "${APP_PASSWORD:-}"
            printf 'export AUTH_COOKIE_DOMAIN=%q\n' "${AUTH_COOKIE_DOMAIN:-}"
            printf 'export DATABASE_URL=%q\n' "${DATABASE_URL:-}"
            printf 'export DOMAIN=%q\n' "${DOMAIN:-}"
            printf 'export DOMAIN_WWW=%q\n' "${DOMAIN_WWW:-}"
            printf 'export LETSENCRYPT_EMAIL=%q\n' "${LETSENCRYPT_EMAIL:-}"
            printf 'export ENABLE_SSL=%q\n' "${ENABLE_SSL:-}"
            printf 'export INCLUDE_WWW=%q\n' "${INCLUDE_WWW:-}"
            printf 'export APP_SUBDOMAINS=%q\n' "${APP_SUBDOMAINS:-}"
            printf 'export GEMINI_API_KEY=%q\n' "${GEMINI_API_KEY:-}"
            printf 'export GEMINI_MODEL=%q\n' "${GEMINI_MODEL:-}"
            printf 'export GIFTS_PASSWORD=%q\n' "${GIFTS_PASSWORD:-}"
            printf 'export GIFTS_USERS=%q\n' "${GIFTS_USERS:-}"
            cat deploy-artifact/deploy-vps.sh
          } | ssh "${SSH_ARGS[@]}" "$REMOTE" "bash -se"
