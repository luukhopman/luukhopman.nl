name: Deploy application to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy application files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app/,alembic/,alembic.ini,pyproject.toml,uv.lock,README.md"
          target: "~/website"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_FALLBACK: ${{ secrets.DATABASE_URL_FALLBACK }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DOMAIN_WWW: ${{ secrets.DOMAIN_WWW }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          ENABLE_SSL: ${{ secrets.ENABLE_SSL }}
          INCLUDE_WWW: ${{ secrets.INCLUDE_WWW }}
          APP_SUBDOMAINS: ${{ secrets.APP_SUBDOMAINS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_PASSWORD,DATABASE_URL,DATABASE_URL_FALLBACK,DOMAIN,DOMAIN_WWW,LETSENCRYPT_EMAIL,ENABLE_SSL,INCLUDE_WWW,APP_SUBDOMAINS,GEMINI_API_KEY
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"

            APP_DIR="$HOME/website"
            SERVICE_NAME="fastapi-website"
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            NGINX_CONF="/etc/nginx/sites-available/${SERVICE_NAME}"
            LEGACY_SERVICE_NAME="fastapi-todo"
            LEGACY_SERVICE_FILE="/etc/systemd/system/${LEGACY_SERVICE_NAME}.service"
            LEGACY_NGINX_CONF="/etc/nginx/sites-available/${LEGACY_SERVICE_NAME}"

            ROOT_DOMAIN="${DOMAIN:-luukhopman.nl}"
            INCLUDE_WWW="${INCLUDE_WWW:-true}"
            WWW_DOMAIN="${DOMAIN_WWW:-www.${ROOT_DOMAIN}}"
            ENABLE_SSL="${ENABLE_SSL:-true}"
            LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL:-}"
            APP_SUBDOMAINS="${APP_SUBDOMAINS:-wishlist cookbook todo}"
            EFFECTIVE_DATABASE_URL="${DATABASE_URL:-}"

            build_primary_domain_list() {
              local domains=()

              if [ -n "$ROOT_DOMAIN" ]; then
                domains+=("$ROOT_DOMAIN")
                if [ "$INCLUDE_WWW" = "true" ]; then
                  domains+=("$WWW_DOMAIN")
                fi
              else
                domains+=("$EXTERNAL_IP")
              fi

              printf '%s\n' "${domains[@]}"
            }

            build_redirect_domain_list() {
              local domains=()

              if [ -n "$ROOT_DOMAIN" ]; then
                for subdomain in $APP_SUBDOMAINS; do
                  domains+=("${subdomain}.${ROOT_DOMAIN}")
                done
              fi

              printf '%s\n' "${domains[@]}"
            }

            build_certbot_domain_list() {
              build_primary_domain_list
              build_redirect_domain_list
            }

            render_redirect_server_blocks() {
              if [ -z "$ROOT_DOMAIN" ]; then
                return
              fi

              for subdomain in $APP_SUBDOMAINS; do
                cat <<EOF_REDIRECT
            server {
                listen 80;
                server_name ${subdomain}.${ROOT_DOMAIN};

                return 307 \$scheme://${ROOT_DOMAIN}/${subdomain}\$is_args\$args;
            }

            EOF_REDIRECT
              done
            }

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            sudo apt-get update -y
            sudo apt-get install -y nginx curl certbot python3-certbot-nginx

            if ! command -v uv >/dev/null 2>&1; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              source "$HOME/.local/bin/env"
            fi

            if [ -f "$LEGACY_SERVICE_FILE" ]; then
              sudo systemctl disable --now "$LEGACY_SERVICE_NAME" || true
              sudo rm -f "$LEGACY_SERVICE_FILE"
            fi
            sudo rm -f "/etc/nginx/sites-enabled/${LEGACY_SERVICE_NAME}"
            sudo rm -f "$LEGACY_NGINX_CONF"

            uv python install 3.13

            if [ -d "$APP_DIR/.venv" ]; then
              sudo chown -R "$USER:$USER" "$APP_DIR/.venv"
            fi

            uv sync

            set +e
            MIGRATION_OUTPUT=$(DATABASE_URL="$EFFECTIVE_DATABASE_URL" uv run alembic upgrade head 2>&1)
            MIGRATION_STATUS=$?
            set -e

            if [ $MIGRATION_STATUS -ne 0 ]; then
              echo "$MIGRATION_OUTPUT"

              if echo "$MIGRATION_OUTPUT" | grep -qi "Network is unreachable" && echo "${DATABASE_URL:-}" | grep -qi "supabase.co"; then
                echo ""
                echo "Supabase connectivity issue detected."
                echo "Use the Supabase pooler connection string (IPv4-capable) as DATABASE_URL."
                echo "Make sure the URL includes sslmode=require."
                echo ""
              fi

              if [ -n "${DATABASE_URL_FALLBACK:-}" ]; then
                EFFECTIVE_DATABASE_URL="$DATABASE_URL_FALLBACK"
                DATABASE_URL="$EFFECTIVE_DATABASE_URL" uv run alembic upgrade head
              else
                exit $MIGRATION_STATUS
              fi
            fi

            cat <<SERVICEEOF | sudo tee "$SERVICE_FILE" > /dev/null
            [Unit]
            Description=Uvicorn daemon for FastAPI Website App
            After=network.target

            [Service]
            User=$USER
            Group=www-data
            WorkingDirectory=$APP_DIR
            Environment="PATH=$APP_DIR/.venv/bin:/usr/local/bin:/usr/bin"
            Environment="APP_PASSWORD=${APP_PASSWORD:-}"
            Environment="DATABASE_URL=$EFFECTIVE_DATABASE_URL"
            Environment="GEMINI_API_KEY=${GEMINI_API_KEY:-}"
            ExecStart=$APP_DIR/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --workers 2
            Restart=always

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE_NAME"
            sudo systemctl restart "$SERVICE_NAME"

            EXTERNAL_IP=$(curl -s ifconfig.me)
            SERVER_NAMES=$(build_primary_domain_list | tr '\n' ' ' | xargs)
            REDIRECT_SERVER_BLOCKS="$(render_redirect_server_blocks)"
            NGINX_BACKUP="$(mktemp)"

            if [ -f "$NGINX_CONF" ]; then
              sudo cp "$NGINX_CONF" "$NGINX_BACKUP"
            fi

            cat <<NGINXEOF | sudo tee "$NGINX_CONF" > /dev/null
            server {
                listen 80;
                server_name $SERVER_NAMES;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }

            $REDIRECT_SERVER_BLOCKS
            NGINXEOF

            sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl restart nginx

            if command -v ufw >/dev/null 2>&1; then
              sudo ufw allow 'Nginx Full' || true
            fi

            if [ "$ENABLE_SSL" = "true" ] && [ -n "$ROOT_DOMAIN" ]; then
              CERTBOT_ARGS=(--nginx -n --agree-tos --redirect --expand --cert-name "$ROOT_DOMAIN")
              if [ -n "$LETSENCRYPT_EMAIL" ]; then
                CERTBOT_ARGS+=(--email "$LETSENCRYPT_EMAIL")
              else
                CERTBOT_ARGS+=(--register-unsafely-without-email)
              fi

              while IFS= read -r domain; do
                CERTBOT_ARGS+=(-d "$domain")
              done < <(build_certbot_domain_list)

              if ! sudo certbot "${CERTBOT_ARGS[@]}"; then
                if [ -s "$NGINX_BACKUP" ]; then
                  sudo cp "$NGINX_BACKUP" "$NGINX_CONF"
                  sudo nginx -t
                  sudo systemctl restart nginx
                fi
                exit 1
              fi
            fi

            rm -f "$NGINX_BACKUP"
